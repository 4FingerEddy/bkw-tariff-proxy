notes:
  - NAS mount does not support Python venv symlinks; development venv is /home/rootkeeper/.venvs/bkw-tariff-proxy.
  - Current Synology deployment still has the historic '*-test' stack/container name, but now runs live BKW data.
  - Synthetic mode is disabled. Keep it only as explicit lab mode; production/live operation uses BKW_TEST_DATA_MODE=off or no variable.
  - BKW live payload uses quarter-hour intervals. The proxy groups them into hourly Loxone relative slots using the arithmetic mean feed-in value per hour.
  - Average aggregation deployed to Synology/Portainer on 2026-07-02; audit: /mnt/synology-rootkeeper/reports/bkw-tariff-proxy/live-cutover/20260702_194108.
  - BKW currently publishes next-day values. Before midnight the HTTP proxy may show partial_horizon because +0/current is not yet available; this is safer than fake fallback values.
  - Loxone Library/template export can now be finalized against live data once downstream optimizer behavior is confirmed.
  - GHCR release target: ghcr.io/4fingereddy/bkw-tariff-proxy:<version>. First publication should stay private until Patrick explicitly chooses public visibility.
