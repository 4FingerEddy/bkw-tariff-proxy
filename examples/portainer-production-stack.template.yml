# Production stack template for the BKW tariff HTTP proxy.
#
# Before production use:
# 1. pin the desired image tag,
# 2. keep BKW_TEST_DATA_MODE off/absent,
# 3. bind the port only to the intended LAN interface if your host has multiple networks,
# 4. verify /health, /v1/status-code and /v1/loxone.json before connecting Loxone automation.

services:
  bkw-tariff-proxy:
    image: ghcr.io/4fingereddy/bkw-tariff-proxy:0.1.0
    container_name: bkw-tariff-proxy
    restart: unless-stopped
    ports:
      - "8785:8785"
    environment:
      TZ: Europe/Zurich
      DATA_DIR: /data
      BKW_ENDPOINT: https://api.bkw.ch/api/dyntariffs/v1/Tariffs/energyreturn
      POLL_INTERVAL_SECONDS: "900"
      CACHE_MAX_AGE_SECONDS: "5400"
      REQUIRE_FULL_HORIZON: "true"
      BKW_TEST_DATA_MODE: "off"
    volumes:
      - bkw-tariff-proxy-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8785/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  bkw-tariff-proxy-data:
