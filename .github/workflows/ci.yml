name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*.*.*']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bkw-tariff-proxy

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        run: pytest -q

      - name: Compile package
        run: python -m py_compile src/bkw_tariff_proxy/*.py

  docker-smoke:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: bkw-tariff-proxy:ci-smoke

      - name: Run smoke container
        run: |
          docker run -d --name bkw-tariff-proxy-smoke -p 8785:8785 \
            -e BKW_TEST_DATA_MODE=synthetic \
            -e REQUIRE_FULL_HORIZON=true \
            bkw-tariff-proxy:ci-smoke
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8785/health >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8785/health | grep -qx 'ok'
          curl -fsS http://127.0.0.1:8785/v1/status | grep -qx 'ok'
          curl -fsS http://127.0.0.1:8785/v1/status-code | grep -qx '0'
          curl -fsS http://127.0.0.1:8785/v1/loxone.json | python -m json.tool >/dev/null
          docker logs bkw-tariff-proxy-smoke

      - name: Stop smoke container
        if: always()
        run: docker rm -f bkw-tariff-proxy-smoke || true

  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs: [test, docker-smoke]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and publish multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
